<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Geometry Dash Custom Shapes</title>
    <style>
        body { margin: 0; background: #0a0a12; color: white; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #555; background: #000; cursor: crosshair; margin-top: 10px; }
        .ui { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 6px; font-weight: bold; border: none; }
        #btn-spike { background: #ff4444; }
        #btn-block { background: #00ffff; }
        #btn-stairs { background: #ff00ff; }
        #btn-pCube { background: #00ff66; }
        #btn-pShip { background: #bd00ff; }
        #btn-finish { background: #ffcc00; }
        button.active { outline: 3px solid white; transform: scale(1.1); }
    </style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>
<div class="ui">
    <button onclick="mode='play'">PLAY</button>
    <button onclick="mode='edit'">EDIT</button>
    <button id="btn-spike" class="active" onclick="setTool('spike')">Duri</button>
    <button id="btn-block" onclick="setTool('block')">Balok</button>
    <button id="btn-stairs" onclick="setTool('stairs')">Tangga</button>
    <button id="btn-pCube" onclick="setTool('pCube')">P.Cube</button>
    <button id="btn-pShip" onclick="setTool('pShip')">P.Ship</button>
    <button id="btn-finish" onclick="setTool('finish')">Finish</button>
</div>

<script>
// ... (Bagian logika update tetap sama) ...

function drawPlayer(x, y, mode) {
    ctx.fillStyle = (mode === 'cube') ? '#0f0' : '#00f';
    if (mode === 'cube') {
        ctx.fillRect(x, y, 30, 30);
    } else {
        // Ship: Segitiga miring 90 derajat ke depan
        ctx.beginPath();
        ctx.moveTo(x + 30, y + 15); // Ujung depan
        ctx.lineTo(x, y);           // Atas
        ctx.lineTo(x, y + 30);      // Bawah
        ctx.fill();
    }
}

function drawObject(o) {
    ctx.fillStyle = (o.type === 'spike') ? '#ff4444' : 
                    (o.type === 'block') ? '#00ffff' : 
                    (o.type === 'stairs') ? '#ff00ff' : 
                    (o.type === 'pCube') ? '#00ff66' : 
                    (o.type === 'pShip') ? '#bd00ff' : '#ffcc00';

    if (o.type === 'spike') {
        ctx.beginPath();
        ctx.moveTo(o.x + 15, o.y); ctx.lineTo(o.x, o.y + 30); ctx.lineTo(o.x + 30, o.y + 30);
        ctx.fill();
    } else if (o.type === 'block' || o.type === 'stairs') {
        ctx.fillRect(o.x, o.y, 30, 30);
    } else if (o.type === 'pCube' || o.type === 'pShip') {
        // Portal: Oval
        ctx.beginPath();
        ctx.ellipse(o.x + 15, o.y + 15, 10, 20, 0, 0, Math.PI * 2);
        ctx.fill();
    } else if (o.type === 'finish') {
        // Bendera
        ctx.fillRect(o.x + 12, o.y, 6, 30); // Tiang
        ctx.beginPath();
        ctx.moveTo(o.x + 18, o.y); ctx.lineTo(o.x + 30, o.y + 10); ctx.lineTo(o.x + 18, o.y + 20);
        ctx.fill();
    }
}

// Panggil drawPlayer dan drawObject di dalam render()
</script>
</body>
</html>
