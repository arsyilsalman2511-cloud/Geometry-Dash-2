<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Geometry Dash Editor</title>
    <style>
        body { margin: 0; background: #0a0a12; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #555; background: #000; cursor: crosshair; margin-top: 10px; }
        .ui { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; color: white; transition: 0.2s; }
        #btn-spike { background: #ff4444; }
        #btn-block { background: #00ffff; color: #000; }
        #btn-stairs { background: #ff00ff; }
        #btn-pCube { background: #00ff66; color: #000; }
        #btn-pShip { background: #bd00ff; }
        #btn-finish { background: #ffcc00; color: #000; }
        button.active { outline: 3px solid white; transform: scale(1.1); }
    </style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<div class="ui">
    <button onclick="mode='play'">PLAY</button>
    <button onclick="mode='edit'">EDIT</button>
    <button id="btn-spike" class="active" onclick="setTool('spike')">Duri</button>
    <button id="btn-block" onclick="setTool('block')">Balok</button>
    <button id="btn-stairs" onclick="setTool('stairs')">Tangga</button>
    <button id="btn-pCube" onclick="setTool('pCube')">P.Cube</button>
    <button id="btn-pShip" onclick="setTool('pShip')">P.Ship</button>
    <button id="btn-finish" onclick="setTool('finish')">Finish</button>
</div>

<script>
// ... (Bagian JavaScript sebelumnya sama, tambahkan fungsi render benda di bawah) ...

function renderObjects(o) {
    ctx.save();
    if (o.type === 'spike') {
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.moveTo(o.x, o.y + 30); ctx.lineTo(o.x + 15, o.y); ctx.lineTo(o.x + 30, o.y + 30);
        ctx.fill();
    } else if (o.type === 'block') {
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(o.x, o.y, 30, 30);
    } else if (o.type === 'stairs') {
        ctx.fillStyle = '#ff00ff';
        ctx.fillRect(o.x, o.y + 15, 30, 15);
    } else if (o.type === 'pCube' || o.type === 'pShip') {
        ctx.fillStyle = (o.type === 'pCube') ? '#00ff66' : '#bd00ff';
        ctx.beginPath(); ctx.arc(o.x + 15, o.y + 15, 15, 0, Math.PI * 2); ctx.fill();
    } else if (o.type === 'finish') {
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(o.x + 12, o.y, 6, 30);
    }
    ctx.restore();
}
// Panggil renderObjects(o) di dalam loop render() kamu
</script>
</body>
</html>
