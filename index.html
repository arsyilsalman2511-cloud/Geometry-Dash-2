<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #fff; background: #111; max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="400"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let player = { x: 100, y: 300, vy: 0, w: 30, h: 30, onGround: true };
let obstacles = [{ x: 500, y: 320, w: 30, h: 30 }];
let gameSpeed = 5;
let gravity = 0.8;

function jump() {
    // Versi paksa: jika di tanah, langsung kasih kecepatan ke atas
    if (player.onGround) {
        player.vy = -15;
        player.onGround = false;
    }
}

function update() {
    // Gerakan maju
    player.x += gameSpeed;
    
    // Gravitasi
    player.vy += gravity;
    player.y += player.vy;

    // Cek lantai
    if (player.y >= 320) {
        player.y = 320;
        player.vy = 0;
        player.onGround = true;
    }

    // Cek tabrakan simpel
    obstacles.forEach(o => {
        if (player.x < o.x + o.w && player.x + player.w > o.x &&
            player.y < o.y + o.h && player.y + player.h > o.y) {
            alert("Kena! Restart...");
            player.x = 100;
        }
    });

    // Geser obstacle
    obstacles.forEach(o => o.x -= gameSpeed);
    if (obstacles[0].x < -50) obstacles[0].x = 800;
}

function render() {
    ctx.clearRect(0, 0, 800, 400);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#f00';
    obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
    requestAnimationFrame(() => { update(); render(); });
}

// INPUT SUPER AGRESIF
// PC: Semua tombol keyboard
window.addEventListener('keydown', jump);
// HP & PC: Semua jenis klik/sentuhan
window.addEventListener('mousedown', jump);
window.addEventListener('touchstart', jump);

render();
</script>
</body>
</html>
