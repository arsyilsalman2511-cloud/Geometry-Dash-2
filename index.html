<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geometry Dash - Full Features</title>
    <style>
        body { margin: 0; background: #0a0a12; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #555; background: #000; cursor: crosshair; margin-top: 10px; }
        .ui { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<div class="ui">
    <button onclick="mode='play'">Mode: Main</button>
    <button onclick="mode='edit'">Mode: Editor</button>
    <button onclick="player.mode = (player.mode==='cube'?'ship':'cube')">Switch Cube/Ship</button>
    <button onclick="activeObstacles = []">Clear Level</button>
    <div id="editorStatus">Tools: Klik Canvas untuk tambah Duri</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let mode = 'play';
let cameraX = 0;
let gravity = 0.8;
let player = { x: 100, y: 300, vy: 0, size: 30, mode: 'cube', color: '#0f0' };
let activeObstacles = [{ type: 'spike', x: 500, y: 320 }];

// Kontrol
function triggerAction(isDown) {
    if (player.mode === 'cube') {
        if (isDown && player.y >= 300) player.vy = -15;
    } else {
        player.vy = isDown ? -8 : 8;
    }
}

function update() {
    if (mode === 'play') {
        player.x += 5;
        player.vy += gravity;
        player.y += player.vy;

        // Kamera mengikuti player
        cameraX = player.x - 150;

        // Fisika Cube
        if (player.mode === 'cube' && player.y >= 300) {
            player.y = 300;
            player.vy = 0;
        }
        // Batas atas/bawah
        if (player.y > 370) player.y = 370;
        if (player.y < 0) player.y = 0;
    }
}

function render() {
    ctx.clearRect(0, 0, 800, 400);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Gambar Dunia
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.size, player.size);
    
    ctx.fillStyle = '#f00';
    activeObstacles.forEach(o => ctx.fillRect(o.x - 15, o.y - 30, 30, 30));

    ctx.restore();
    update();
    requestAnimationFrame(render);
}

// Editor Fitur
canvas.addEventListener('mousedown', (e) => {
    if (mode === 'edit') {
        const rect = canvas.getBoundingClientRect();
        const worldX = (e.clientX - rect.left) + cameraX;
        activeObstacles.push({ type: 'spike', x: worldX, y: 320 });
    } else {
        triggerAction(true);
    }
});

window.addEventListener('mouseup', () => triggerAction(false));
window.addEventListener('keydown', (e) => { if(e.code === 'Space') triggerAction(true); });
window.addEventListener('keyup', () => triggerAction(false));

render();
</script>
</body>
</html>
